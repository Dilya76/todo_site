<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать задачу</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>Редактировать задачу</h1>
    <form method="POST" action="/edit_task/{{ task.id }}">
        <input type="text" name="title" value="{{ task.title }}" required>
        <input type="date" name="date" value="{{ task.date }}" required>
        <textarea name="description" placeholder="Описание">{{ task.description }}</textarea>
        <button type="submit">Сохранить</button>
    </form>
    <a href="/tasks" class="back-btn">Назад к задачам</a>
</div>
</body>
</html>
